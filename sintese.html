<title>Síntese - Classificação de Fios</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="app">
  <h1>Síntese - Classificação de Fios</h1>
  <p class="subtitle">Treino focado em fios monofilamentares e multifilamentares, absorvíveis e não absorvíveis.</p>

  <div class="topbar">
    <a class="btn" href="flashcards.html">← Voltar para Habilidades Cirúrgicas</a>
    <button class="btn theme-toggle" id="themeToggleBtn" type="button" onclick="toggleTheme()">☀️ Modo Claro</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="card" id="card"></div>
</div>

<script>
function applyTheme(theme) {
  const next = theme === "light" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("siteTheme", next);
  const btn = document.getElementById("themeToggleBtn");
  if (btn) btn.textContent = next === "dark" ? "☀️ Modo Claro" : "🌙 Modo Escuro";
}

function toggleTheme() {
  const current = localStorage.getItem("siteTheme") || "dark";
  applyTheme(current === "dark" ? "light" : "dark");
}

applyTheme(localStorage.getItem("siteTheme") || "dark");

const fios = [
  {
    nome: "Nylon",
    imagem: "",
    filamento: "Monofilamentar",
    absorcaoTipo: "Não absorvível",
    origemTipo: "Sintético",
    uso: "Sutura de pele e pontos externos"
  },
  {
    nome: "Prolene",
    imagem: "",
    filamento: "Monofilamentar",
    absorcaoTipo: "Não absorvível",
    origemTipo: "Sintético",
    uso: "Anastomoses vasculares e fechamento sob baixa reação"
  },
  {
    nome: "Polietileno",
    imagem: "",
    filamento: "Monofilamentar",
    absorcaoTipo: "Não absorvível",
    origemTipo: "Sintético",
    uso: "Fixações que exigem alta resistência"
  },
  {
    nome: "Polidioxanona",
    imagem: "",
    filamento: "Monofilamentar",
    absorcaoTipo: "Absorvível",
    origemTipo: "Sintético",
    uso: "Aponeurose e planos profundos"
  },
  {
    nome: "Monocryl",
    imagem: "",
    filamento: "Monofilamentar",
    absorcaoTipo: "Absorvível",
    origemTipo: "Sintético",
    uso: "Subcutâneo e intradérmico"
  },
  {
    nome: "Poliéster (Dacron)",
    imagem: "",
    filamento: "Multifilamentar",
    absorcaoTipo: "Não absorvível",
    origemTipo: "Sintético",
    uso: "Tendões e estruturas sob tensão"
  },
  {
    nome: "Algodão",
    imagem: "",
    filamento: "Multifilamentar",
    absorcaoTipo: "Não absorvível",
    origemTipo: "Sintético",
    uso: "Ligaduras"
  },
  {
    nome: "Seda",
    imagem: "",
    filamento: "Multifilamentar",
    absorcaoTipo: "Não absorvível",
    origemTipo: "Natural",
    uso: "Ligaduras e hemostasia"
  },
  {
    nome: "Vicryl (Poliglactina)",
    imagem: "",
    filamento: "Multifilamentar",
    absorcaoTipo: "Absorvível",
    origemTipo: "Sintético",
    uso: "Subcutâneo e fechamento de mucosa"
  },
  {
    nome: "Ácido Poliglicólico (PGA)",
    imagem: "",
    filamento: "Multifilamentar",
    absorcaoTipo: "Absorvível",
    origemTipo: "Sintético",
    uso: "Planos internos com necessidade de absorção"
  },
  {
    nome: "Catgut Simples",
    imagem: "",
    filamento: "Multifilamentar",
    absorcaoTipo: "Absorvível",
    origemTipo: "Natural",
    uso: "Ligaduras e mucosa"
  },
  {
    nome: "Catgut Cromado",
    imagem: "",
    filamento: "Multifilamentar",
    absorcaoTipo: "Absorvível",
    origemTipo: "Natural",
    uso: "Subcutâneo com absorção mais lenta"
  }
];

const ROUND_OPTIONS = [5, 10, 15, 20, 24];
let selectedRounds = 10;
let roundsTotal = selectedRounds;
let round = 0;
let score = 0;
let currentQuestion = null;
let waitingNext = false;
let roundFios = [];

function shuffle(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function buildVisualHtml(fio) {
  if (fio.imagem && fio.imagem.trim()) {
    const safe = fio.imagem.replace(/'/g, "\\'");
    return `<div class="visual"><img src="${fio.imagem}" alt="${fio.nome}" onerror="this.parentElement.textContent='${fio.nome}'; this.remove();" data-src="${safe}"></div>`;
  }
  return `<div class="visual">Foto do fio (opcional)</div>`;
}

function pickNameDistractors(correctName) {
  return shuffle(fios.map((item) => item.nome).filter((nome) => nome !== correctName)).slice(0, 3);
}

function buildTripleConfig(fio) {
  return `${fio.filamento} • ${fio.absorcaoTipo} • ${fio.origemTipo}`;
}

function pickTripleConfigDistractors(correctConfig) {
  const universe = Array.from(new Set(fios.map((item) => buildTripleConfig(item)))).filter((cfg) => cfg !== correctConfig);
  return shuffle(universe).slice(0, 3);
}

function buildQuestion(fio) {
  const type = Math.floor(Math.random() * 7);

  if (type === 0) {
    const correct = fio.filamento;
    return {
      fio,
      prompt: "Qual o tipo de filamento desse fio?",
      correct,
      options: shuffle(["Monofilamentar", "Multifilamentar"])
    };
  }

  if (type === 1) {
    const correct = fio.absorcaoTipo;
    return {
      fio,
      prompt: "Absorvível ou não absorvível?",
      correct,
      options: shuffle(["Absorvível", "Não absorvível"])
    };
  }

  if (type === 2) {
    const correct = fio.origemTipo;
    return {
      fio,
      prompt: "Quanto à origem, ele é:",
      correct,
      options: shuffle(["Sintético", "Natural"])
    };
  }

  if (type === 3) {
    const correct = `${fio.filamento} • ${fio.absorcaoTipo}`;
    const universe = Array.from(new Set(fios.map((item) => `${item.filamento} • ${item.absorcaoTipo}`)));
    const distractors = shuffle(universe.filter((value) => value !== correct)).slice(0, 3);
    return {
      fio,
      prompt: "Qual é a classificação combinada deste fio?",
      correct,
      options: shuffle([correct, ...distractors])
    };
  }

  if (type === 4) {
    const correct = buildTripleConfig(fio);
    const distractors = pickTripleConfigDistractors(correct);
    return {
      fio,
      prompt: "Acerte a configuração do fio:",
      correct,
      options: shuffle([correct, ...distractors])
    };
  }

  if (type === 5) {
    const correct = fio.nome;
    const distractors = pickNameDistractors(correct);
    return {
      fio,
      prompt: `Qual fio tem a configuração: ${buildTripleConfig(fio)}?`,
      correct,
      options: shuffle([correct, ...distractors])
    };
  }

  const correct = fio.nome;
  const distractors = pickNameDistractors(correct);
  return {
    fio,
    prompt: `Qual fio corresponde a: ${fio.filamento}, ${fio.absorcaoTipo}, ${fio.origemTipo}?`,
    correct,
    options: shuffle([correct, ...distractors])
  };
}

function setRounds(value) {
  selectedRounds = value;
  showStart();
}

function buildRoundPool(total) {
  const pool = [];
  while (pool.length < total) {
    pool.push(...shuffle([...fios]));
  }
  return pool.slice(0, total);
}

function updateStats() {
  const high = Number(localStorage.getItem("sinteseHighScore") || 0);
  document.getElementById("stats").innerHTML = `
    <span>Rodada: ${Math.min(round + 1, roundsTotal)}/${roundsTotal}</span>
    <span>Pontuação: ${score}</span>
    <span>Recorde: ${high}</span>
  `;
}

function updateProgress() {
  const progress = (round / roundsTotal) * 100;
  document.getElementById("progressBar").style.width = `${Math.max(0, Math.min(100, progress)).toFixed(1)}%`;
}

function showStart() {
  round = 0;
  score = 0;
  waitingNext = false;
  roundsTotal = selectedRounds;
  updateStats();
  updateProgress();

  document.getElementById("card").innerHTML = `
    <h2 class="question">Jogo de Síntese</h2>
    <p class="subtitle">Perguntas focadas nos fios principais e nas suas características.</p>
    <div class="difficulty-group">
      ${ROUND_OPTIONS.map((value) => `<button class="mode-btn ${selectedRounds === value ? "active" : ""}" type="button" onclick="setRounds(${value})">${value}</button>`).join("")}
    </div>
    <p class="subtitle">Quantidade de questões: ${selectedRounds}</p>
    <button class="btn primary" type="button" onclick="startGame()">Iniciar Jogo</button>
  `;
}

function startGame() {
  round = 0;
  score = 0;
  roundsTotal = selectedRounds;
  roundFios = buildRoundPool(roundsTotal);
  nextQuestion();
}

function nextQuestion() {
  if (round >= roundsTotal) {
    showFinal();
    return;
  }

  waitingNext = false;
  const fio = roundFios[round % roundFios.length];
  currentQuestion = buildQuestion(fio);
  updateStats();
  updateProgress();

  document.getElementById("card").innerHTML = `
    ${buildVisualHtml(currentQuestion.fio)}
    <h3 class="fio-name">Fio: ${currentQuestion.fio.nome}</h3>
    <h2 class="question">${currentQuestion.prompt}</h2>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="next-wrap"><button class="btn hidden" id="nextBtn" type="button" onclick="advanceRound()">Próxima</button></div>
  `;

  const optionsEl = document.getElementById("options");
  currentQuestion.options.forEach((option) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "option-btn";
    btn.textContent = option;
    btn.onclick = () => checkAnswer(btn, option);
    optionsEl.appendChild(btn);
  });
}

function checkAnswer(button, selected) {
  if (waitingNext) return;
  waitingNext = true;

  const feedback = document.getElementById("feedback");
  document.querySelectorAll(".option-btn").forEach((b) => b.disabled = true);

  if (selected === currentQuestion.correct) {
    score += 1;
    button.classList.add("correct");
    feedback.textContent = "✔ Correto!";
  } else {
    button.classList.add("wrong");
    feedback.textContent = `✖ Resposta correta: ${currentQuestion.correct}`;
    document.querySelectorAll(".option-btn").forEach((b) => {
      if (b.textContent === currentQuestion.correct) b.classList.add("correct");
    });
  }

  document.getElementById("nextBtn").classList.remove("hidden");
  updateStats();
}

function advanceRound() {
  round += 1;
  nextQuestion();
}

function showFinal() {
  const high = Number(localStorage.getItem("sinteseHighScore") || 0);
  const newHigh = Math.max(high, score);
  localStorage.setItem("sinteseHighScore", String(newHigh));

  updateStats();
  updateProgress();
  document.getElementById("progressBar").style.width = "100%";

  const percentage = ((score / roundsTotal) * 100).toFixed(1);
  document.getElementById("card").innerHTML = `
    <h2 class="question">Resultado Final</h2>
    <p class="subtitle">Você acertou ${score} de ${roundsTotal} (${percentage}%).</p>
    <p class="subtitle">Recorde: ${newHigh}</p>
    <div class="topbar topbar-center topbar-mt-8">
      <button class="btn primary" type="button" onclick="startGame()">Jogar Novamente</button>
      <a class="btn" href="flashcards.html">Voltar para Habilidades Cirúrgicas</a>
    </div>
  `;
}

showStart();
</script>
</body>
</html>
