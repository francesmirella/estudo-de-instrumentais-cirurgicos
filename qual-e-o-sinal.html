<body>
<div class="app">
  <h1>Qual é o Sinal?</h1>
  <p class="subtitle">Veja a foto do sinal e escolha a descrição correta.</p>

  <div class="topbar">
    <a class="btn" href="flashcards.html">← Voltar para Instrumentais</a>
    <button class="btn theme-toggle" id="themeToggleBtn" type="button" onclick="toggleTheme()">☀️ Modo Claro</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="card" id="card"></div>
</div>

<script>
function applyTheme(theme) {
  const next = theme === "light" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("siteTheme", next);
  const btn = document.getElementById("themeToggleBtn");
  if (btn) btn.textContent = next === "dark" ? "☀️ Modo Claro" : "🌙 Modo Escuro";
}

function toggleTheme() {
  const current = localStorage.getItem("siteTheme") || "dark";
  applyTheme(current === "dark" ? "light" : "dark");
}

applyTheme(localStorage.getItem("siteTheme") || "dark");

const SINAIS_FOTOS = [
  "Tesoura Reta.png",
  "Tesoura Reta 2.png",
  "Tesoura Reta 3.png",
  "Tesoura Curva.png",
  "Tesoura Curva 2.png",
  "Porta-Agulha.png",
  "Pinça Hemostática Curva.png",
  "Pinça Dente de Rato.png",
  "Pinça Anatômica.png",
  "Gosset.png",
  "Gaze.png",
  "Gaze 2.png",
  "Fio de Ligadura.png",
  "Fio de Ligadura 2.png",
  "Farabeuf.png",
  "Farabeuf 2.png",
  "Doyen.png",
  "Compressa.png",
  "Compressa 2.png",
  "Backaus.png",
  "Backaus 2.png"
];

function normalizeInstrumentName(fileName) {
  return fileName
    .replace(/\.(png|jpg|jpeg|webp)$/i, "")
    .replace(/\s\d+$/, "")
    .trim();
}

const sinais = SINAIS_FOTOS.map((fileName) => {
  const instrumento = normalizeInstrumentName(fileName);
  return {
    instrumento,
    imagem: `sinais/${fileName}`
  };
});

const roundsTotal = sinais.length;
let round = 0;
let score = 0;
let currentQuestion = null;
let waitingNext = false;
let order = [];
let correctSlotQueue = [];

function shuffle(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function nextCorrectSlot() {
  if (correctSlotQueue.length === 0) {
    correctSlotQueue = shuffle([0, 1, 2, 3]);
  }
  return correctSlotQueue.pop();
}

function buildOptions(correctName) {
  const pool = Array.from(new Set(sinais.map((item) => item.instrumento))).filter((name) => name !== correctName);
  const distractors = shuffle(pool).slice(0, 3);
  const correctIndex = nextCorrectSlot();
  const options = [...distractors];
  options.splice(correctIndex, 0, correctName);
  return options;
}

function updateStats() {
  const high = Number(localStorage.getItem("sinalHighScore") || 0);
  document.getElementById("stats").innerHTML = `
    <span>Rodada: ${Math.min(round + 1, roundsTotal)}/${roundsTotal}</span>
    <span>Pontuação: ${score}</span>
    <span>Recorde: ${high}</span>
  `;
}

function updateProgress() {
  const progress = (round / roundsTotal) * 100;
  document.getElementById("progressBar").style.width = `${Math.max(0, Math.min(100, progress)).toFixed(1)}%`;
}

function showStart() {
  round = 0;
  score = 0;
  waitingNext = false;
  order = shuffle([...sinais]);
  updateStats();
  updateProgress();

  document.getElementById("card").innerHTML = `
    <h2 class="question">Treino de sinal cirúrgico</h2>
    <p class="subtitle">Você verá a foto do sinal e escolherá o nome correto.</p>
    <button class="btn primary" type="button" onclick="startGame()">Iniciar Jogo</button>
  `;
}

function startGame() {
  round = 0;
  score = 0;
  order = shuffle([...sinais]);
  correctSlotQueue = [];
  nextQuestion();
}

function nextQuestion() {
  if (round >= roundsTotal) {
    showFinal();
    return;
  }

  waitingNext = false;
  const item = order[round];
  currentQuestion = {
    instrumento: item.instrumento,
    imagem: item.imagem,
    correct: item.instrumento,
    options: buildOptions(item.instrumento)
  };

  updateStats();
  updateProgress();

  document.getElementById("card").innerHTML = `
    <div class="visual"><img src="${currentQuestion.imagem}" alt="Sinal de ${currentQuestion.instrumento}" onerror="this.parentElement.textContent='Imagem não encontrada'; this.remove();"></div>
    <h2 class="question">Qual é o nome do sinal?</h2>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="next-wrap"><button class="btn hidden" id="nextBtn" type="button" onclick="advanceRound()">Próxima</button></div>
  `;

  const optionsEl = document.getElementById("options");
  currentQuestion.options.forEach((option) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "option-btn";
    btn.textContent = option;
    btn.onclick = () => checkAnswer(btn, option);
    optionsEl.appendChild(btn);
  });
}

function checkAnswer(button, selected) {
  if (waitingNext) return;
  waitingNext = true;

  const feedback = document.getElementById("feedback");
  document.querySelectorAll(".option-btn").forEach((b) => b.disabled = true);

  if (selected === currentQuestion.correct) {
    score += 1;
    button.classList.add("correct");
    feedback.textContent = "✔ Correto!";
  } else {
    button.classList.add("wrong");
    feedback.textContent = `✖ Resposta correta: ${currentQuestion.correct}`;
    document.querySelectorAll(".option-btn").forEach((b) => {
      if (b.textContent === currentQuestion.correct) b.classList.add("correct");
    });
  }

  document.getElementById("nextBtn").classList.remove("hidden");
  updateStats();
}

function advanceRound() {
  round += 1;
  nextQuestion();
}

function showFinal() {
  const high = Number(localStorage.getItem("sinalHighScore") || 0);
  const newHigh = Math.max(high, score);
  localStorage.setItem("sinalHighScore", String(newHigh));

  updateStats();
  updateProgress();
  document.getElementById("progressBar").style.width = "100%";

  const percentage = ((score / roundsTotal) * 100).toFixed(1);
  document.getElementById("card").innerHTML = `
    <h2 class="question">Resultado Final</h2>
    <p class="subtitle">Você acertou ${score} de ${roundsTotal} (${percentage}%).</p>
    <p class="subtitle">Recorde: ${newHigh}</p>
    <div class="topbar topbar-center topbar-mt-8">
      <button class="btn primary" type="button" onclick="startGame()">Jogar Novamente</button>
      <a class="btn" href="flashcards.html">Voltar para Instrumentais</a>
    </div>
  `;
}

showStart();
</script>
</body>
</html>
